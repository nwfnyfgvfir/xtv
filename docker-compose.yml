# Production: pull prebuilt image from GHCR (no local build).
#
#   cp .env.example .env
#   docker compose pull && docker compose up -d

services:
  tv:
    image: ${TV_IMAGE:-ghcr.io/OWNER/tv:latest}
    container_name: tv-app
    ports:
      - "${HOST_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      MEDIA_ROOT: /media
      DATABASE_URL: sqlite:////data/app.db
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - ${MEDIA_DIR:-./media}:/media
      - ${DATA_DIR:-./data}:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
